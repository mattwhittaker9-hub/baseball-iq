var UMPIRE_SYSTEM=`You are a certified baseball umpire and rules expert who has studied the Official Baseball Rules (OBR) for 20 years. You have also studied the Intangibles Baseball IQ program used to evaluate professional players. Your job is to verify youth baseball quiz questions for factual accuracy.

═══════════════════════════════════════
FORCE PLAY RULES
═══════════════════════════════════════
A force play exists ONLY when the batter becomes a runner and forces other runners to advance.
- Runner on 1st only → force at 2nd only
- Runners on 1st and 2nd → force at 2nd and 3rd
- Bases loaded → force at all four bases including home
- Runner on 2nd only → NO force anywhere
- Runner on 3rd only → NO force anywhere
- Runners on 1st and 3rd → force at 2nd ONLY. NO force at 3rd. NO force at home.
- Runners on 2nd and 3rd → NO force anywhere
- Runners on 2nd and 3rd → NO force anywhere

═══════════════════════════════════════
CUTOFF AND RELAY ASSIGNMENTS
═══════════════════════════════════════
SINGLE TO LEFT FIELD: SS covers 2nd. 2B backs up. Pitcher backs up 2nd from behind.
SINGLE TO CENTER FIELD: SS covers 2nd (if ball goes left of center) or 2B covers 2nd (if right of center).
SINGLE TO RIGHT FIELD: 2B covers 2nd. SS backs up.

EXTRA BASE HIT / DOUBLE-CUT RELAY:
- Ball to LEFT FIELD or LEFT-CENTER: SS is lead relay. 2B is trail relay.
- Ball to RIGHT FIELD or RIGHT-CENTER: 2B is lead relay. SS is trail relay.
- 1B is NEVER a relay or cutoff man on extra base hits. NEVER.
- 3B is NEVER a relay man from right field.

CUTOFF TO HOME (throw from outfield):
- Throw from LEFT FIELD to home: 3B is cutoff man.
- Throw from CENTER FIELD to home: 1B or 3B depending on system, but pitcher often serves as second cut.
- Throw from RIGHT FIELD to home: 1B is cutoff man (lines up between RF and home).

BACKING UP BASES:
- Left fielder backs up 3rd base on ALL throws to third (steals, wild pitches, relay throws).
- Right fielder backs up 1st base on throws from the left side.
- Center fielder backs up 2nd base on most plays.
- Pitcher backs up HOME PLATE on extra base hits and relay plays when a play at home is expected.
- Pitcher backs up 3RD BASE on throws from right field going to third (after backing up home initial position).
- On a WILD PITCH or PASSED BALL: pitcher's primary job is to back up HOME PLATE. LEFT FIELDER backs up third. Pitcher does NOT back up third on wild pitches.
- Catcher NEVER leaves home plate unprotected when runners are in scoring position (runner on 2nd or 3rd).
- Catcher backs up 1ST BASE on ALL ground balls when no runners are on base, or runner on 1st only. This is the CATCHER's job, not the pitcher's. The pitcher does NOT back up first base on ground balls -- that is the catcher's responsibility when no runners are on.
- Pitcher backs up 1st base ONLY on ground balls to the RIGHT SIDE (1B or 2B charging), where the pitcher must cover the bag itself because 1B has left. On ground balls to the LEFT SIDE (3B, SS) with no runners on, the pitcher has no backup responsibility at first -- the catcher handles that.
- Do NOT mark correct any answer that says the pitcher backs up first base on a left-side ground ball with no runners on. That is the catcher's job.

═══════════════════════════════════════
PITCHER RESPONSIBILITIES (commonly confused)
═══════════════════════════════════════
- Ground ball to right side: pitcher immediately breaks toward 1st to cover in case 1B can't get there.
- Bunt with 1B charging: pitcher covers 1st base.
- Wild pitch / passed ball: pitcher breaks toward HOME PLATE to back it up. LF backs up 3rd.
- Extra base hit with runner on 1st: pitcher starts toward home (expected play) but must read and shift to 3rd if throw goes there.
- Pickoff to 1B: pitcher backs up 1st behind the bag.
- Pickoff at 1B with runner on 3rd (1st and 3rd): pitcher backs up HOME after throw to 1st.
- Comebacker with runner on 3rd and 1 out, 1st and 3rd situation: throw to 2nd starts the double play, NOT straight home unless runner on 3rd is charging. Per Intangibles IQ: check runner at 3rd, then throw to first for the sure out if winning run is on 3rd with one out.

═══════════════════════════════════════
BASERUNNING RULES (from Intangibles IQ + OBR)
═══════════════════════════════════════
- Runner on 2nd, two outs: take a wider secondary lead (walking lead) to create better angle home on contact.
- Runner on 1st, 1st and 3rd, fly ball, less than 2 outs: TAG UP to either advance or draw a cutoff. Going halfway risks being doubled off. Per Intangibles: tag up is correct.
- Balk called but pitcher still throws: ball is DEAD. Runner on 2nd automatically advances to 3rd. Hitter does not swing.
- Runner misses first base (hits a double): defense can appeal with ball live by tagging runner or touching 1st; OR if ball is dead, pitcher steps off rubber and throws to 1st. Tagging runner standing on 2nd while ball is live is also valid.
- No doubles defense: outfielders play a few steps deeper than normal, shading toward foul lines. NOT shallow.

═══════════════════════════════════════
INFIELD FLY RULE
═══════════════════════════════════════
Called when: runners on 1st and 2nd (or bases loaded), fewer than 2 outs, fair fly ball that an infielder can catch with ordinary effort. NOT called on line drives or bunts. Batter is automatically out. Runners may advance at their own risk but do not have to.
Common wrong answer: it is NOT called with runner on 1st only.

═══════════════════════════════════════
DROPPED THIRD STRIKE
═══════════════════════════════════════
- Runner on 1st, fewer than 2 outs: batter is automatically out. No running.
- 1st base unoccupied at time of pitch, any count of outs: batter may run to 1st.
- 2 outs, any base situation: batter may always run on dropped 3rd strike.

═══════════════════════════════════════
HITTING COUNTS AND APPROACH (from Intangibles IQ)
═══════════════════════════════════════
- Best hitter's counts: 0-0, 1-0, 2-0, 2-1, 3-1. Hitter is ahead -- likely to see fastball, can be selective.
- Two-strike approach: widen stance, shorten swing, cover full plate, make contact.
- Runner on 2nd, no outs: hitter should drive the ball to right side to advance the runner.
- Runner on 3rd, infield in, 1 out: look for pitch to elevate for fly ball.
- Runner on 3rd, infield back, 1 out: make solid contact up the middle, air or ground.

═══════════════════════════════════════
BUNT SITUATIONS (from Intangibles IQ)
═══════════════════════════════════════
- Runners on 1st and 2nd, bunt: throw to THIRD. Keeping tying run off third is priority over a double play that may not happen.
- Bunt hard back to pitcher, runners on 1st and 2nd, visiting team winning by 1, late game: throw to THIRD (keep tying run off third), NOT second for double play attempt.
- Wheel play: 3B charges, SS breaks to cover 3rd, 2B covers 2nd, 1B holds. Used to get force out at 3rd.

═══════════════════════════════════════
FIRST AND THIRD DEFENSE (from Team Florida + coaching sources)
═══════════════════════════════════════
Options for the catcher on a stolen base attempt (runner on 1st steals 2nd):
1. Throw through to 2nd to get the stealing runner (risk: runner on 3rd scores)
2. Fake throw to 2nd then fire to 3rd to catch aggressive runner
3. Cut play: pitcher cuts the catcher's throw partway and looks runner back to 3rd
Key principle: DECEPTION. Never telegraph what you're going to do. Decision depends on score, outs, runner speed, arm strength.

═══════════════════════════════════════
OUTFIELD POSITIONING
═══════════════════════════════════════
- Center fielder has absolute priority over all other outfielders on any ball he can reach.
- No doubles defense: outfielders play deeper and shade toward foul lines. Not shallow.
- Foul fly ball, winning run on 3rd, less than 2 outs: outfielder catches it ONLY if confident he can throw the runner out from that spot. Otherwise let it drop.
- Runner on 2nd, 2 outs, tie game, lead-off hitter up: outfield plays straight away, normal depth. Two outs means play the hitter.

═══════════════════════════════════════

BUNT COVERAGE ASSIGNMENTS (from 12U/13U Playbook + Georgia Elite Defensive Playbook)
═══════════════════════════════════════════════════════════════════════
SITUATION: No runners OR runner on 1st only
- 3B charges hard down the line
- 1B charges hard down the line  
- 2B rotates to cover 1st base
- SS rotates to cover 2nd base
- P covers middle of infield (any bunt past catcher not fielded by 1B or 3B)
- C covers home plate area, calls who fields ball and where throw goes
- Throw usually goes to 1st base for the sure out

SITUATION: Runner on 2nd only
- 3B holds at third (can't leave runner unguarded)
- 1B charges
- P covers 3rd base line bunts
- SS covers 2nd base
- 2B covers 1st base
- Key: Hold the runner at 2nd, get out at 1st

SITUATION: Runners on 1st and 2nd (sacrifice bunt -- most important)
- 3B charges hard (responsible for balls bunted to left side)
- 1B charges hard (responsible for balls bunted to right side)
- P fields any bunt up the middle or left side beyond catcher
- 2B rotates to cover 1st base
- SS rotates to cover 2nd base
- THROW: Per Intangibles IQ -- throw to THIRD BASE to keep tying run off third.
  NOT second base for double play attempt. The out at third (force) is the priority.
- WHEEL PLAY: SS breaks early to cover 3rd, 3B charges late -- designed to catch offense off guard

SITUATION: Runner on 3rd (squeeze bunt defense)
- 3B charges hard
- 1B charges hard
- P charges hard -- MUST get to the ball fast
- SS covers 2nd, 2B covers 1st
- Catcher covers home -- cannot leave home plate
- Throw usually goes to 1st. If runner breaks from 3rd early, catcher covers plate.

CATCHER'S ROLE ON ALL BUNTS:
- Catcher is the "traffic cop" -- calls who fields the ball ("you, you, you!") 
  and where the throw goes ("one!", "two!", "three!")
- Catcher NEVER fields a bunt that the pitcher or corner infielder can reach
- Catcher covers home plate area at all times

PITCHER'S ROLE ON BUNTS:
- If ball is bunted to the LEFT (3rd base) side and 3B fields it: pitcher continues to 3rd base 
  to cover the now-vacated bag
- If ball is bunted to the RIGHT (1st base) side: pitcher covers 1st base if 1B has charged
- Pitcher fields any bunt directly back at him, or up the middle out of catcher's reach

POP FLY / FLY BALL PRIORITY ORDER (from Perry Hill Infield System)
═══════════════════════════════════════════════════════════════════════
1. CF has absolute priority over ALL fielders. No exceptions.
2. LF has priority over all infielders but yields to CF.
3. RF has priority over all infielders but yields to CF.
4. SS has first priority among infielders.
5. 2B has second infield priority.
6. 3B has third infield priority.
7. 1B has fourth infield priority.
8. Catcher goes for pop-ups in his area until called off.
9. Pitcher is LAST priority -- catches fly ball only in emergency, otherwise 
   directs traffic by pointing and calling the fielder's name.

CALLING FOR THE BALL: Infielder calls "I've got it!" three times.
Outfielder always wins over infielder when they both call.

PULL HITTER POSITIONING — CRITICAL (very commonly gets confused)
═══════════════════════════════════════════════════════════════════════
LEFT-HANDED HITTER pulls to the RIGHT SIDE of the field (first base side, right field).
  - 3B shades TOWARD SECOND BASE (away from the third base line)
  - SS shifts toward second base (covering the gap)
  - 1B and 2B shade toward the right field line
  - 3B is the LAST person who should be near the line for a lefty pull hitter
  - RF shades toward the line, LF plays normal or shades left-center

RIGHT-HANDED HITTER pulls to the LEFT SIDE of the field (third base side, left field).
  - 3B shades TOWARD THE LINE (third base line)
  - SS shifts toward the 5-6 hole
  - 1B plays off the bag, 2B shades toward second
  - LF shades toward the line, RF plays normal

OPPOSITE FIELD HITTER:
  - Left-handed opposite field hitter hits to LEFT field → 3B stays at line, SS stays
  - Right-handed opposite field hitter hits to RIGHT field → 1B stays in, 2B shades right

COMMON ERROR TO CATCH: A question saying "3B shades to the line for a left-handed pull hitter" is WRONG.
A question saying "3B shades away from the line for a right-handed pull hitter" is also WRONG.

INFIELD SITUATIONAL RULES (from Perry Hill Infield System)
═══════════════════════════════════════════════════════════════════════
DOUBLE PLAYS:
- Double play balls make themselves -- they are NOT made. Made by how ball is hit, direction, runner speed.
- 2B feeds SS on balls hit to 2B: underhand no-spin toss on ball hit right at him; 
  backhand toss on balls hit behind him toward 1st.
- SS to 2B pivot: approach with hands up and in, right foot near back inside corner of base.

FIRST BASEMAN:
- On ground balls to right side: 1B breaks to bag, sets up to receive throw.
- Bunt with runner on 1st only: 1B charges hard, responsible for right side bunts.
- Bunt with runners on 1st and 2nd: 1B charges in straight line toward home plate.
- 1B holds runner: right foot against base, inside edge, toes beyond front inside corner.

SHORTSTOP:
- First priority among infielders on pop flies.
- Determines who covers second base on steal attempts -- SS decides.
- Relay man for LF and CF throws.

THIRD BASEMAN:
- On bunt situations: charges hard, responsible for left side bunts.
- On bunt with runner on 2nd: DOES NOT charge -- must protect 3rd.
- Relay/cutoff for certain LF throws going home (lines up between LF and home).

OUTFIELD SITUATIONAL RULES (from multiple coaching sources)
═══════════════════════════════════════════════════════════════════════
BACKING UP BASES (every outfielder has a job on every play):
- LF backs up ALL throws to 3rd base (steals, relay throws, wild pitches).
- RF backs up ALL throws to 1st base from left side of infield.
- CF backs up 2nd base on most plays.
- Outfielders sprint to backup position BEFORE the play happens, not after.

NO DOUBLES DEFENSE:
- Outfielders play a FEW STEPS DEEPER than normal. NOT shallow.
- Shade toward foul lines.
- Priority: nothing gets over their head or down the line.

FOUL FLY BALL WITH WINNING RUN ON 3RD, LESS THAN 2 OUTS:
- Outfielder catches it ONLY if confident he can throw runner out from that spot.
- If unsure, let it drop -- runner cannot score on a foul fly ball.

COMMUNICATION:
- Nearest outfielder to the one making a play calls the base and depth: "Two! Two! In! In!"
- Center fielder is captain -- calls off both corner outfielders.

THROWING THROUGH CUTOFF MAN:
- Outfielders throw THROUGH the relay man, chest-to-head high.
- On line throws: relay man lets it go.
- Off-line or no play at lead base: relay man cuts and redirects.
- Outfielder yells "GO!" if throw should go through, says nothing otherwise.

HITTING / SITUATIONAL HITTING RULES
═══════════════════════════════════════
- Best hitter counts: 0-0, 1-0, 2-0, 2-1, 3-1. Hitter ahead, look for fastball, be selective.
- Pitcher ahead: 0-2, 1-2, 2-2. Two-strike approach: protect plate, shorten swing, hit to all fields.
- 3-0 count: almost always take unless coach gives explicit green light. NEVER swing 3-0 without permission.
- Hit-and-run: batter MUST swing and try to hit ball on the ground to protect the runner.
- Suicide squeeze: batter MUST bunt regardless of pitch location. No take allowed.
- Safety squeeze: batter bunts ONLY IF runner on third breaks for home. Read the runner first.
- Runner on 2nd, no outs: try to drive ball to RIGHT side of field to advance the runner to third.
- Runner on 3rd, infield in, less than 2 outs: look for pitch to elevate for a fly ball.
- Runner on 3rd, infield back: make solid contact in any direction.
- Two-strike adjustment: widen stance, shorten swing, protect full plate, do NOT try to pull for power.
- Working the count: always good strategy. More pitches = more information for the hitter.
- 3-1 count: hitter is ahead, good pitch to drive. Be selective but aggressive on a hittable pitch.

DEFENSIVE POSITIONING ACCURACY CHECK:
- Always verify: LEFT-handed pull hitters pull to the RIGHT SIDE. 3B shades AWAY from line.
- Always verify: RIGHT-handed pull hitters pull to the LEFT SIDE. 3B shades TOWARD line.
- A question with 3B shading to the line for a LEFT-HANDED pull hitter = AUTOMATIC FAIL.
- A question with 3B shading away from the line for a RIGHT-HANDED pull hitter = AUTOMATIC FAIL.

QUESTION QUALITY RULES
══════════════════════════════════════
FORMAT CHECK (check these FIRST before factual accuracy):
- Every answer choice MUST end with a period, question mark, or exclamation mark. If any choice does not end with sentence-ending punctuation, FAIL the question immediately.
- No choice may end with a dangling word like: the, a, an, to, at, in, on, or, and, but, for, fir, eve, cor, ne, le, etc. These indicate a truncated sentence. FAIL immediately.
- No choice may exceed 15 words. FAIL if any choice is overly long.
══════════════════════════════════════
ORIGINAL
═══════════════════════════════════════
- All four choices must be meaningfully DIFFERENT. Two choices describing the same play = automatic FAIL.
- Explanation must match the stated correct answer exactly. Mismatch = FAIL.
- Wrong answers must be plausibly wrong, not absurd.
- Scenario must be physically possible given the runner and out configuration stated.
- REALISM: Must be a situation that occurs in real baseball at any level from youth through high school. Challenging and counterintuitive situations are encouraged. Only flag as FAIL if physically impossible or a pro-only rule exception that never occurs in amateur baseball.
- EXPLANATION QUALITY: Must read like a coach teaching after the play. Vague or circular = FAIL.
- ANSWER CLARITY: Correct answer must be clearly the best option.
- TEACHING VALUE: Difficult questions revealing something most players don't already know are the most valuable. Do not penalize for being challenging -- only for being wrong, unclear, or unrealistic.

Review each question and return a JSON array with one object per question:
{"index": <0-based index>, "pass": <true if factually correct AND all choices distinct, false if any error>, "issue": "<blank if pass=true, otherwise a SHORT specific description of the exact error>"}

Return ONLY the JSON array. No other text.`;

function autoCategory(){document.getElementById('sel-cat').value=CAT_MAP[document.getElementById('sel-pos').value]||'infield';}
function status(msg,type){var el=document.getElementById('status');el.textContent=msg;el.className='status '+(type||'info');}
function prog(pct){var w=document.getElementById('prog-wrap');var f=document.getElementById('prog-fill');if(pct===null){w.style.display='none';return;}w.style.display='block';f.style.width=pct+'%';}

fetch(SB+'/rest/v1/questions?select=id',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'count=exact','Range':'0-0'}}).then(r=>{var c=r.headers.get('content-range');if(c)document.getElementById('db-count').textContent=c.split('/')[1]+' questions';});

async function callClaude(messages, system, maxTokens){
  var body={model:'claude-sonnet-4-20250514',max_tokens:maxTokens||4000,messages:messages};
  if(system) body.system=system;
  var r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  var d=await r.json();
  if(d.error) throw new Error(d.error.message);
  return d.content[0].text;
}

async function generate(){
  var pos=document.getElementById('sel-pos').value;
  var cat=document.getElementById('sel-cat').value;
  var diff=document.getElementById('sel-diff').value;
  var count=parseInt(document.getElementById('sel-count').value);
  var focus=document.getElementById('sel-focus').value.trim();
  document.getElementById('gen-btn').disabled=true;
  document.getElementById('preview').innerHTML='';
  document.getElementById('insert-area').style.display='none';
  generated=[];

  var diffStr=diff==='mixed'?'Mix of difficulty 1, 2, and 3':'All difficulty '+diff;
  var focusStr=focus?'Focus specifically on: '+focus+'.':'Cover varied realistic game situations.';
  var roleDesc=ROLE_DESC[pos]||'';

  // ── PASS 1: GENERATE ─────────────────────────────────────────────────────
  prog(5);
  status('Pass 1 of 2 -- Generating '+count+' questions for '+pos+'...','info');

  var genPrompt='Generate '+count+' baseball IQ questions for the '+pos+' position.\n\n'+
'MISSION: This app teaches baseball players and their coaches to make smarter decisions on the field. Questions should range from fundamental to advanced - the challenging ones that reveal something most players do not know are the most valuable. The explanation is the most important part: write it like a coach teaching after the play, in plain language that makes the answer clear.\n\n'+
'POSITION ROLE (stay strictly within these bounds):\n'+roleDesc+'\n\n'+
'Settings: Category="'+cat+'". '+diffStr+'. '+focusStr+'\n\n'+
'CRITICAL RULES:\n'+
'- First-person voice as the '+pos+'\n'+
'- Scenarios must be common youth baseball situations -- things that happen multiple times per season\n'+
'- RANDOMIZE which choice is correct -- vary it across A, B, C, and D\n'+
'- All 4 choices must be plausible, youth-friendly, and COMPLETE SENTENCES.\n'+'- Every choice MUST end with a period, question mark, or exclamation mark.\n'+'- Every choice must be under 12 words. If it runs long, trim it but keep it complete.\n'+'- NEVER end a choice with a preposition, article, or conjunction (e.g. never end with: the, a, an, to, at, in, on, or, and, but, for, with, from).\n'+'- BAD EXAMPLE: "Throw to third to get the lead runner before stepping on fir" — NEVER DO THIS.\n'+'- GOOD EXAMPLE: "Throw to third, then step on first." — Complete thought, ends with period.\n'+
'- Factually accurate per the Official Baseball Rules -- especially force plays, cutoffs, catcher positioning\n'+
'- EXPLANATION: Write it like a coach teaching the player after the play. If the correct answer is surprising or counterintuitive, explain clearly why. Use plain language. 2-3 sentences max.\n'+
'- Never repeat scenarios\n\n'+
'Return ONLY a valid JSON array of '+count+' objects:\n'+
'{\n'+
'  "difficulty": <1|2|3>,\n'+
'  "category": "'+cat+'",\n'+
'  "position": "'+pos+'",\n'+
'  "inning": "<e.g. Top 4th>",\n'+
'  "score": "<e.g. Tie game>",\n'+
'  "outs": <0|1|2>,\n'+
'  "count": "<e.g. 1-2>",\n'+
'  "runners_first": <true|false>,\n'+
'  "runners_second": <true|false>,\n'+
'  "runners_third": <true|false>,\n'+
'  "scenario": "<situation max 25 words>",\n'+
'  "question": "<the question max 15 words>",\n'+
'  "question_type": "multiple_choice",\n'+
'  "choice_a": "<option A max 12 words>",\n'+
'  "choice_b": "<option B max 12 words>",\n'+
'  "choice_c": "<option C max 12 words>",\n'+
'  "choice_d": "<option D max 12 words>",\n'+
'  "correct_index": <0=A, 1=B, 2=C, 3=D -- VARY THIS across questions>,\n'+
'  "explanation": "<2-3 sentences, factually accurate per OBR>",\n'+
'  "statcast_stat": "<e.g. 78%>",\n'+
'  "statcast_blurb": "<max 15 words>"\n'+
'}\n\nReturn nothing but the JSON array.';

  var rawQs=[];
  try{
    prog(20);
    var genText=await callClaude([{role:'user',content:genPrompt}],null,8000);
    rawQs=JSON.parse(genText.replace(/```json|```/g,'').trim());
    // Pass 1 filter: basic field presence
    rawQs=rawQs.filter(function(q){
      return q.choice_a&&q.choice_b&&q.choice_c&&q.choice_d&&q.scenario&&q.question&&
             typeof q.correct_index==='number'&&q.correct_index>=0&&q.correct_index<=3;
    });
    // Format validator: reject any question with incomplete/truncated choices
    var badWords = /\s(a|an|the|to|at|in|on|or|and|but|for|with|from|of|by|as|is|are|was|be|this|that|it)$/i;
    rawQs = rawQs.filter(function(q) {
      var choices = [q.choice_a, q.choice_b, q.choice_c, q.choice_d];
      for(var i = 0; i < choices.length; i++) {
        var c = (choices[i]||'').trim();
        // Must end with sentence-ending punctuation
        if(!/[.?!]$/.test(c)) return false;
        // Must not be empty or too short
        if(c.length < 5) return false;
        // Must not have trailing incomplete words (caught above but double-check)
        if(c.length > 60) return false; // anything over 60 chars is too long
      }
      return true;
    });
    console.log('After format validation: ' + rawQs.length + ' questions passed');
    prog(40);
    status('Pass 1 done -- '+rawQs.length+' questions generated. Running umpire verification...','info');
  }catch(e){
    status('Generation error: '+e.message,'err');
    prog(null);
    document.getElementById('gen-btn').disabled=false;
    return;
  }

  if(!rawQs.length){
    status('No valid questions generated. Try again.','err');
    prog(null);
    document.getElementById('gen-btn').disabled=false;
    return;
  }

  // ── PASS 2: VERIFY ────────────────────────────────────────────────────────
  status('Pass 2 of 2 -- Umpire reviewing each question for factual accuracy...','info');
  prog(55);

  // Build verification payload -- send question + answer + explanation to umpire
  var verifyPayload=rawQs.map(function(q,i){
    var choices=[q.choice_a,q.choice_b,q.choice_c,q.choice_d];
    var ltrs=['A','B','C','D'];
    return 'Question '+i+' ('+q.position+', runners: 1st='+q.runners_first+' 2nd='+q.runners_second+' 3rd='+q.runners_third+', outs='+q.outs+'):\n'+
      'Scenario: '+q.scenario+'\n'+
      'Question: '+q.question+'\n'+
      'Choices: '+choices.map(function(c,j){return ltrs[j]+') '+c;}).join(' | ')+'\n'+
      'Stated correct answer: '+ltrs[q.correct_index]+') '+choices[q.correct_index]+'\n'+
      'Explanation: '+q.explanation;
  }).join('\n\n---\n\n');

  var verifyResults=[];
  try{
    var verifyText=await callClaude([{role:'user',content:verifyPayload}],UMPIRE_SYSTEM,2000);
    verifyResults=JSON.parse(verifyText.replace(/```json|```/g,'').trim());
  }catch(e){
    // If verification fails, show all questions but flagged as unverified
    console.warn('Verification parse error:',e.message);
    verifyResults=rawQs.map(function(_,i){return{index:i,pass:null,issue:'Verification unavailable'};});
  }

  prog(90);

  // Merge results
  var passCount=0, failCount=0;
  generated=[];
  rawQs.forEach(function(q,i){
    var vr=verifyResults.find(function(v){return v.index===i;})||{pass:null,issue:'Not reviewed'};
    q._verified=vr;
    if(vr.pass===true){passCount++;generated.push(q);}
    else{failCount++;}
  });

  prog(100);
  setTimeout(function(){prog(null);},500);

  var msg='✅ '+passCount+' passed verification';
  if(failCount) msg+=' · ❌ '+failCount+' rejected';
  status(msg, failCount>passCount?'warn':'ok');

  renderPreview(rawQs, verifyResults);
  if(generated.length) document.getElementById('insert-area').style.display='block';
  document.getElementById('gen-btn').disabled=false;
}

function renderPreview(qs, verifyResults){
  var ltrs=['A','B','C','D'];
  document.getElementById('preview').innerHTML=qs.map(function(q,i){
    var choices=[q.choice_a,q.choice_b,q.choice_c,q.choice_d];
    var vr=verifyResults.find(function(v){return v.index===i;})||{pass:null,issue:'Not reviewed'};
    var passStr=vr.pass===true?'✅ PASS':vr.pass===false?'❌ FAIL':'⚪ UNVERIFIED';
    var verifyClass=vr.pass===true?'pass':vr.pass===false?'fail':'';
    var cardClass=vr.pass===false?'q-card rejected':'q-card';
    return '<div class="'+cardClass+'" id="qcard-'+i+'" style="'+(vr.pass===false?'border-color:#5a1020;background:#0a0208':'')+'">'+
      '<div class="q-pos">'+(i+1)+'. '+q.position+' · Diff '+q.difficulty+' · Correct=<b>'+ltrs[q.correct_index]+'</b> · '+(q.runners_first?'1B ':'')+( q.runners_second?'2B ':'')+( q.runners_third?'3B ':'')+q.outs+' outs</div>'+
      '<div class="q-scenario">'+q.scenario+'</div>'+
      '<div class="q-question">'+q.question+'</div>'+
      '<div class="q-choices">'+choices.map(function(ch,ci){return '<div class="q-choice'+(ci===q.correct_index?' correct':'')+'">'+ltrs[ci]+'. '+ch+'</div>';}).join('')+'</div>'+
      '<div class="q-expl">'+(q.explanation||'')+'</div>'+
      '<div class="q-verify '+verifyClass+'">'+passStr+(vr.issue?' -- '+vr.issue:'')+'</div>'+
    '</div>';
  }).join('');

  // Show rejected questions collapsed but visible
  qs.forEach(function(q,i){
    var vr=verifyResults.find(function(v){return v.index===i;})||{pass:null};
    if(vr.pass===false){
      var el=document.getElementById('qcard-'+i);
      if(el) el.style.display='block';
    }
  });
}

async function insertAll(){
  if(!generated.length)return;
  var btn=document.getElementById('insert-btn');
  btn.disabled=true;
  status('Checking for duplicates...','info');
  prog(10);

  // Pull existing scenarios from DB to deduplicate
  var existingScenarios=new Set();
  try{
    var er=await fetch(SB+'/rest/v1/questions?select=scenario',{
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Range':'0-999'}
    });
    var existing=await er.json();
    existing.forEach(function(q){ existingScenarios.add((q.scenario||'').trim().toLowerCase().substring(0,60)); });
  }catch(e){ console.warn('Could not fetch existing scenarios for dedup check'); }

  // Filter out duplicates
  var beforeCount=generated.length;
  var deduped=generated.filter(function(q){
    var key=(q.scenario||'').trim().toLowerCase().substring(0,60);
    return !existingScenarios.has(key);
  });
  var dupCount=beforeCount-deduped.length;
  if(dupCount>0) status('Removed '+dupCount+' duplicate scenario(s). Inserting '+deduped.length+' unique questions...','warn');
  else status('Inserting '+deduped.length+' verified unique questions...','info');

  if(!deduped.length){ status('All questions were duplicates -- nothing to insert.','err'); btn.disabled=false; prog(null); return; }

  prog(20);
  var rows=deduped.map(function(q){
    return{
      difficulty:q.difficulty,category:q.category,position:q.position,
      inning:q.inning,score:q.score,outs:parseInt(q.outs),count:q.count,
      runners_first:!!q.runners_first,runners_second:!!q.runners_second,runners_third:!!q.runners_third,
      scenario:q.scenario,question:q.question,question_type:'multiple_choice',
      choice_a:q.choice_a,choice_b:q.choice_b,choice_c:q.choice_c,choice_d:q.choice_d,
      correct_index:q.correct_index,
      explanation:q.explanation,
      statcast_stat:q.statcast_stat||null,statcast_blurb:q.statcast_blurb||null
    };
  });
  try{
    var r=await fetch(SB+'/rest/v1/questions',{method:'POST',
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify(rows)});
    prog(100);
    if(r.ok){
      status('✅ Inserted '+deduped.length+' verified unique questions!','ok');
      fetch(SB+'/rest/v1/questions?select=id',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'count=exact','Range':'0-0'}}).then(function(r2){var c=r2.headers.get('content-range');if(c)document.getElementById('db-count').textContent=c.split('/')[1]+' questions';});
      generated=[];
      document.getElementById('insert-area').style.display='none';
    }else{var err=await r.json();status('Insert failed: '+JSON.stringify(err).substring(0,120),'err');}
  }catch(e){status('Network error: '+e.message,'err');}
  btn.disabled=false;
  setTimeout(function(){prog(null);},1000);
}


function showAudit(){
  document.getElementById('audit-area').style.display='block';
  document.getElementById('audit-area').scrollIntoView({behavior:'smooth'});
}

var failedIds=[];

async function runAudit(){
  var pos=document.getElementById('audit-pos').value;
  var btn=document.getElementById('audit-btn');
  btn.disabled=true;
  failedIds=[];
  document.getElementById('audit-results').innerHTML='';
  document.getElementById('audit-delete-area').style.display='none';

  function astatus(msg,type){var el=document.getElementById('audit-status');el.textContent=msg;el.className='status '+(type||'info');}
  function aprog(pct){var w=document.getElementById('audit-prog-wrap');var f=document.getElementById('audit-prog-fill');if(pct===null){w.style.display='none';return;}w.style.display='block';f.style.width=pct+'%';}

  astatus('Fetching questions from database...','info');
  aprog(5);

  var url=SB+'/rest/v1/questions?select=id,position,scenario,question,choice_a,choice_b,choice_c,choice_d,correct_index,explanation,runners_first,runners_second,runners_third,outs&question_type=eq.multiple_choice';
  if(pos!=='all') url+='&position=eq.'+encodeURIComponent(pos);

  var questions=[];
  try{
    var r=await fetch(url,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Range':'0-999'}});
    questions=await r.json();
  }catch(e){astatus('Fetch error: '+e.message,'err');btn.disabled=false;aprog(null);return;}

  if(!questions.length){astatus('No questions found.','warn');btn.disabled=false;aprog(null);return;}
  astatus('Fetched '+questions.length+' questions. Verifying in batches of 10...','info');

  var BATCH=10;
  var allResults=[];
  var batches=[];
  for(var i=0;i<questions.length;i+=BATCH) batches.push(questions.slice(i,i+BATCH));

  for(var bi=0;bi<batches.length;bi++){
    aprog(Math.round((bi/batches.length)*85)+5);
    astatus('Verifying batch '+(bi+1)+' of '+batches.length+'...','info');
    var batch=batches[bi];
    var ltrs=['A','B','C','D'];
    var payload=batch.map(function(q,i){
      var choices=[q.choice_a,q.choice_b,q.choice_c,q.choice_d];
      var sep=' | ';return 'Question '+i+' ('+q.position+', 1st='+q.runners_first+' 2nd='+q.runners_second+' 3rd='+q.runners_third+', outs='+q.outs+'):'+"\n"+'Scenario: '+q.scenario+"\n"+'Question: '+q.question+"\n"+'Choices: '+choices.map(function(c,j){return ltrs[j]+') '+c;}).join(sep)+"\n"+'Correct: '+ltrs[q.correct_index]+') '+choices[q.correct_index]+"\n"+'Explanation: '+q.explanation;
    }).join('\n\n---\n\n');

    try{
      var vText=await callClaude([{role:'user',content:payload}],UMPIRE_SYSTEM,2000);
      var vResults=JSON.parse(vText.replace(/```json|```/g,'').trim());
      vResults.forEach(function(vr){
        var q=batch[vr.index];
        if(q){
          allResults.push({q:q,pass:vr.pass,issue:vr.issue||''});
          if(vr.pass===false) failedIds.push(q.id);
        }
      });
    }catch(e){
      batch.forEach(function(q){allResults.push({q:q,pass:null,issue:'Verification error'});});
    }
  }

  aprog(100);
  setTimeout(function(){aprog(null);},500);

  var passed=allResults.filter(function(r){return r.pass===true;}).length;
  var failed=allResults.filter(function(r){return r.pass===false;}).length;
  var ltrs=['A','B','C','D'];
  var msg='Audit complete: passed='+passed+', failed='+failed;
  astatus(msg,failed>0?'warn':'ok');

  var failHtml=allResults.filter(function(r){return r.pass===false;}).map(function(r){
    var q=r.q; var choices=[q.choice_a,q.choice_b,q.choice_c,q.choice_d];
    return '<div class="q-card" style="border-color:#5a1020;background:#080208"><div class="q-pos">'+q.position+' - '+q.id.substring(0,8)+'</div><div class="q-scenario">'+q.scenario+'</div><div class="q-question">'+q.question+'</div><div class="q-choices">'+choices.map(function(ch,ci){return '<div class="q-choice'+(ci===q.correct_index?' correct':'')+'">'+ltrs[ci]+'. '+ch+'</div>';}).join('')+'</div><div class="q-expl">'+q.explanation+'</div><div class="q-verify fail">FAIL: '+r.issue+'</div></div>';
  }).join('');

  document.getElementById('audit-results').innerHTML=failHtml||'<div style="color:#3ecf82;padding:12px">No issues found!</div>';
  if(failedIds.length) document.getElementById('audit-delete-area').style.display='block';
  btn.disabled=false;
}

async function deleteFailedQuestions(){
  if(!failedIds.length)return;
  var btn=document.getElementById('audit-delete-btn');
  btn.disabled=true;
  var deleted=0;
  for(var i=0;i<failedIds.length;i++){
    try{
      await fetch(SB+'/rest/v1/questions?id=eq.'+failedIds[i],{method:'DELETE',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'}});
      deleted++;
    }catch(e){console.warn('Delete failed',failedIds[i]);}
  }
  document.getElementById('audit-status').textContent='Deleted '+deleted+' questions.';
  document.getElementById('audit-status').className='status ok';
  document.getElementById('audit-results').innerHTML='';
  document.getElementById('audit-delete-area').style.display='none';
  failedIds=[];
  btn.disabled=false;
  fetch(SB+'/rest/v1/questions?select=id',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'count=exact','Range':'0-0'}}).then(function(r2){var c=r2.headers.get('content-range');if(c)document.getElementById('db-count').textContent=c.split('/')[1]+' questions';});
}
