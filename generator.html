<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamond IQ — Question Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#06111f;color:#e8e0d0;font-family:'Barlow Condensed','Arial Narrow',sans-serif;min-height:100vh;padding:20px}
.wrap{max-width:700px;margin:0 auto}
.hdr{background:#0f1e35;border-radius:12px 12px 0 0;padding:18px 22px;border-bottom:1px solid rgba(200,168,75,.2);display:flex;justify-content:space-between;align-items:center}
.logo{font-size:22px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#c8a84b}.logo span{color:#fff}
.sub{font-size:10px;letter-spacing:2px;color:#7a8fa8;text-transform:uppercase;margin-top:2px}
.ctrl{background:#0a1628;padding:14px 22px;border-bottom:1px solid rgba(200,168,75,.2);display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.clbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#7a8fa8;display:block;margin-bottom:5px}
select{background:#0f1e35;border:1px solid rgba(200,168,75,.25);color:#e8e0d0;padding:8px 12px;border-radius:6px;font-size:14px;font-family:inherit;cursor:pointer}
.gbtn{background:#c8a84b;color:#0a1628;border:none;padding:10px 22px;border-radius:6px;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.gbtn:hover{background:#e0b85a}.gbtn:disabled{background:#1a2a3a;color:#4a5a6a;cursor:not-allowed}
.vlog{background:#060e1a;padding:10px 22px;border-bottom:1px solid rgba(200,168,75,.15);font-size:11px;font-family:'Courier New',monospace;color:#7a8fa8;min-height:36px;max-height:80px;overflow-y:auto}
.lok{color:#4caf78}.lfail{color:#e05c3a}.linfo{color:#c8a84b}
.spin{display:none;padding:40px;text-align:center;color:#7a8fa8;background:#0a1628}.spin.on{display:block}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#c8a84b;margin:0 4px;animation:p 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes p{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}
.qout{display:none;background:#0a1628;padding:22px}.qout.on{display:block}
.qmeta{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.qb{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:4px;font-weight:700}
.bp{background:rgba(200,168,75,.15);color:#c8a84b;border:1px solid rgba(200,168,75,.3)}
.bt{background:rgba(90,180,224,.15);color:#5ab4e0;border:1px solid rgba(90,180,224,.3)}
.bs{background:rgba(74,175,120,.15);color:#4caf78;border:1px solid rgba(74,175,120,.3)}
.qsc{font-size:19px;font-weight:700;line-height:1.4;margin-bottom:6px}
.qst{font-size:15px;color:#7a8fa8;font-style:italic;margin-bottom:20px}
.qch{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.cb{background:#0f1e35;border:1px solid rgba(200,168,75,.2);color:#e8e0d0;padding:13px 16px;border-radius:8px;text-align:left;font-size:15px;font-family:inherit;cursor:pointer;display:flex;gap:12px;align-items:flex-start;transition:all .15s;width:100%}
.cb:hover{border-color:#c8a84b;background:rgba(200,168,75,.08)}
.cb.ok{background:rgba(74,175,120,.15);border-color:#4caf78}
.cb.no{background:rgba(224,92,58,.1);border-color:rgba(224,92,58,.4)}
.cl{font-weight:700;color:#c8a84b;min-width:18px;font-size:16px}
.exp{display:none}.exp.on{display:block}
.ec{background:rgba(74,175,120,.1);border-left:3px solid #4caf78;padding:12px 16px;border-radius:0 8px 8px 0;margin-bottom:12px}
.ew{background:rgba(14,25,42,.6);border-left:3px solid rgba(224,92,58,.4);padding:10px 14px;border-radius:0 6px 6px 0;margin-bottom:8px}
.elbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.elbl.ok{color:#4caf78}.elbl.no{color:#e05c3a}
.etxt{font-size:14px;line-height:1.5;color:#e8e0d0}
.acts{display:flex;gap:10px;margin-top:18px;padding-top:18px;border-top:1px solid rgba(200,168,75,.15)}
.apass{background:#1a4a2a;color:#80ffb0;border:none;padding:10px 20px;border-radius:6px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.aflag{background:#4a1a0a;color:#ffb090;border:none;padding:10px 20px;border-radius:6px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.anext{background:transparent;color:#c8a84b;border:1px solid rgba(200,168,75,.3);padding:10px 20px;border-radius:6px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.sbar{background:#060e1a;border-radius:0 0 12px 12px;padding:8px 22px;border-top:1px solid rgba(200,168,75,.15);display:flex;justify-content:space-between;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#4a5a6a;flex-wrap:wrap;gap:4px}
.sok{color:#4caf78}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">
  <div><div class="logo">Diamond <span>IQ</span></div><div class="sub">Question Generator v3.0</div></div>
  <div style="font-size:11px;color:#4caf78;letter-spacing:1px">Engine v5.2 Live</div>
</div>
<div class="ctrl">
  <div><label class="clbl">Position</label>
    <select id="psel">
      <option value="auto">Auto</option>
      <option>Pitcher</option><option>Catcher</option><option>First Baseman</option>
      <option>Second Baseman</option><option>Shortstop</option><option>Third Baseman</option>
      <option>Left Fielder</option><option>Center Fielder</option><option>Right Fielder</option>
      <option>Baserunner</option><option>Hitter</option>
    </select>
  </div>
  <div><label class="clbl">Tier</label>
    <select id="tsel">
      <option value="auto">Auto</option>
      <option value="1">Tier 1</option><option value="2">Tier 2</option><option value="3">Tier 3</option>
    </select>
  </div>
  <div><label class="clbl">Level</label>
    <select id="lsel">
      <option value="auto">Auto</option>
      <option value="foundation">Foundation (8-12)</option>
      <option value="development">Development (13-15)</option>
      <option value="competitive">Competitive (16-18)</option>
      <option value="elite">Elite (18+)</option>
    </select>
  </div>
  <button class="gbtn" id="gbtn" onclick="gen()">Generate</button>
</div>
<div class="vlog" id="vlog"><span class="linfo">Engine v5.2 loaded. Worker connected. Ready.</span></div>
<div class="spin" id="spin"><div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div><div style="margin-top:12px;font-size:13px">Generating against the engine...</div></div>
<div class="qout" id="qout">
  <div class="qmeta" id="qmeta"></div>
  <div class="qsc" id="qsc"></div>
  <div class="qst" id="qst"></div>
  <div class="qch" id="qch"></div>
  <div class="exp" id="exp"></div>
  <div class="acts">
    <button class="apass" onclick="doPass()">Pass</button>
    <button class="aflag" onclick="doFlag()">Flag</button>
    <button class="anext" onclick="gen()">Next</button>
  </div>
</div>
<div class="sbar">
  <span>Engine: <span class="sok">v5.2</span></span>
  <span>Worker: <span class="sok">baseball-iq-badges</span></span>
  <span>Generated: <span id="sgc">0</span> | Passed: <span id="spc">0</span> | Flagged: <span id="sfc">0</span></span>
</div>
</div>
<script>
const W='https://baseball-iq-badges.mattwhittaker9.workers.dev/generate';
const POS=['Pitcher','Catcher','First Baseman','Second Baseman','Shortstop','Third Baseman','Left Fielder','Center Fielder','Right Fielder','Baserunner','Hitter'];
const BAN=['this protects you','communication is key','it is important to','always remember','what is the correct play','in this situation'];
let gc=0,pc=0,fc=0,curQ=null;
const E={
'Pitcher':'CUTOFF ASSIGNMENTS (ABSOLUTE): LF->Home=3B cutoff. LF->3rd=SS cutoff. CF->Home=1B cutoff. CF->3rd=SS cutoff. RF->Home=1B cutoff. RF->3rd=2B cutoff. CUT/THROUGH always called by TARGET BASE PLAYER (Catcher for home, 3B for third). BASE RULES: B1=Force play hunt the bag no read no hesitation. B2=Line drive freeze+one hard step back. B3=Two outs go on contact. B4=Fly ball <2 outs anchor until first touch. B5=R3 ground ball infield back=go on contact, infield in=read through mound, bases loaded=automatic. FORCE RULE: R2 alone is NOT forced. Force only when batter puts ball in play AND runner behind pushing. R1+R2=both forced. R2 only=NOT forced. PITCHER GOLDEN RULES: Complete Stop=discernible pause shoulders settled. Rolling stop=automatic balk. LHP 45-degree rule=lead foot must cross 45-degree plane toward 1st. Disengagement limit=max 2 per PA, 3rd failed attempt=balk. J-Path=trigger is any ball hit right of mound. Sprint toward foul line, receive before bag, inside corner right foot. Handoff Read: 1B stays=pitcher backs up. 1B ranges=pitcher anchors bag. Shadowing=30-45ft behind bag. Home on all OF throws. 3rd on deep RF/CF throws only. Arc Move WP/PB: R3=sprint to home. R2 only=control point halfway, read runner. Comebacker: Bases Loaded=throw home force. R1 Only=1-6-3 DP. R1+R2 tie game=throw 3rd lead force. Bunt: R1=field middle. R2=field 3B line. Wheel=field middle. Squeeze=plate coverage.',
'Catcher':'CUT/THROUGH on throws home is called by CATCHER ONLY. BASE RULES: B1=Force hunt the bag. B3=Two outs go on contact. B4=Fly ball anchor until first touch. FORCE RULE: R2 alone NOT forced. Force requires batter AND runner behind pushing. CATCHER GOLDEN RULES: Level 1A=calls CUT or THROUGH on ALL throws home. Silence=THROUGH. 1st and 3rd defense ALL scenarios are TAG plays because batter has not put ball in play. THE THROUGH=fire 100% to 2nd for the tag. THE CUT=fire to 2nd SS/2B cuts at grass line 10-12 feet from bag. THE SNAP=fake 2nd fire to 3rd for the tag. THE DISENGAGE=pitcher steps off. Steal tag rule=fielder MUST physically TAG the runner, touching bag alone is NOT an out on a steal. Dropped third strike: fair territory=catcher steps inside 1B takes inside corner. Foul territory=outside. Only live if 1B open OR 2 outs.',
'First Baseman':'CUTOFF ASSIGNMENTS: CF->Home=1B cutoff Catcher commands. RF->Home=1B cutoff Catcher commands. These are ONLY throws where 1B is cutoff. BASE RULES: B1=Force hunt the bag not the runner. FORCE RULE: R2 alone NOT forced. 1B GOLDEN RULES: Cutoff on CF and RF throws home=get in the lane give target Catcher calls CUT or THROUGH. Tandem relay anchor=on deep gap/wall hits 1B ABANDONS 1st base to cover 2nd because both MIFs are in relay. Bunt=cover 1st base in ALL configs. J-Path receiver=inside corner right foot ball before body. Reverse Force Hazard=if 1B touches bag first force on R1 is removed. Pro play=throw to 2nd first (3-6-1) to keep force alive.',
'Second Baseman':'CUTOFF ASSIGNMENTS: RF->3rd=2B cutoff 3B commands. Right Side Rule=RF/RCF ball SS covers 2nd bag 2B acts as cutoff. BASE RULES: B1=Force hunt the bag. B2=Line drive freeze+step back. B3=Two outs go. FORCE RULE: R2 alone NOT forced. 2B GOLDEN RULES: Cutoff on RF throws to 3rd ONLY not home. Right Side Rule=RF/RCF ball SS covers 2nd 2B to cutoff spot. Tandem RF/RCF wall=2B is Lead Relay Hands SS is Trailing Relay Boss calls the base. Tandem LF/LCF wall=2B is Trailing Relay Boss SS is Lead Relay Hands. Bunt=cover 1st base ALL configs. Opposite Bag Rule=if 2B goes to cutoff SS anchors 2nd. 2B/SS Level 1B authority=call KILL/HOLD/BACK only NEVER call CUT or THROUGH that is target base players call.',
'Shortstop':'CUTOFF ASSIGNMENTS: LF->3rd=SS cutoff 3B commands. CF->3rd=SS cutoff 3B commands. Right Side Rule=RF/RCF ball SS covers 2nd bag 2B acts as cutoff. CUT LAW=TARGET BASE PLAYER has final word. 3B calls CUT or THROUGH on throws to 3rd. Catcher calls CUT or THROUGH on throws home. SS NEVER calls CUT or THROUGH. BASE RULES: B1=Force hunt bag. B2=Line drive freeze+step back. B3=Two outs go. FORCE RULE: R2 alone NOT forced. SS GOLDEN RULES: Cutoff on LF and CF throws to THIRD BASE not home never home. Right Side Rule=RF/RCF ball SS covers 2nd bag 2B is cutoff. Tandem LF/LCF=SS is Lead Relay Hands 2B is Trailing Relay Boss. Tandem RF/RCF=SS is Trailing Relay Boss 2B is Lead Relay Hands. Bunt R1=cover 2nd. R2=shadow 2nd. Wheel=cover 3rd. Squeeze=cover 3rd. Squeeze Backside Rule=SS covers 3rd not 2nd because 3B crashes home. KILL command=Level 1B calls KILL/HOLD/BACK on mid-sequence runner mistakes. Opposite Bag Rule=SS anchors 2nd when 2B goes to cutoff on right side.',
'Third Baseman':'CUTOFF ASSIGNMENTS: LF->Home=3B is the CUTOFF Catcher commands. LF->3rd=3B is COMMANDER calls CUT or THROUGH. CF->3rd=3B is COMMANDER. RF->3rd=3B is COMMANDER. BASE RULES: B1=Force hunt bag. B2=Line drive freeze+step back. FORCE RULE: R2 alone NOT forced. 3B GOLDEN RULES: Commander on ALL throws to 3rd base=calls CUT or THROUGH on LF CF and RF throws to 3rd. Cutoff on LF throws HOME=get in relay lane between LF and home Catcher calls CUT or THROUGH. Bunt R2 Cardinal Rule=3B STAYS HOME never vacate 3rd with R2 only it is a system failure. Bunt R1=charge. Wheel=crash. Squeeze=crash home. Hot Corner=read the slash do not crash if batter fakes bunt and pulls back.',
'Left Fielder':'CUTOFF ASSIGNMENTS: LF throw home=3B is cutoff Catcher commands. LF throw to 3rd=SS is cutoff 3B commands. BASE RULES: B3=Two outs go on contact. B4=Fly ball anchor until first touch. LF GOLDEN RULES: Throw home=aim for 3B cutoff mans chest Catcher calls CUT or THROUGH. Throw to 3rd=aim for SS cutoff mans chest 3B calls CUT or THROUGH. Tandem LF/LCF wall=SS is Lead relay Hands 2B is Trailing relay Boss calls base. Tag-up=shallow fly walk off toward home Recovery Lead play for drop. Deep fly=anchor until FIRST TOUCH. Momentum=fielder pro-hop is Heavy throw runner holds. Fielder backpedaling is Light throw runner goes. Slice hangs 0.5 seconds longer than hook. LF corner=right foot on bag for push-off.',
'Center Fielder':'CUTOFF ASSIGNMENTS: CF throw home=1B is cutoff Catcher commands. CF throw to 3rd=SS is cutoff 3B commands. BASE RULES: B3=Two outs go on contact. B4=Fly ball anchor until first touch. CF GOLDEN RULES: Level 2 authority=absolute call-off on all outfield fly balls CF calls MINE corners peel off. Gap Drag=CF dictates depth and spacing of LF and RF. Tandem RF/RCF=2B Lead SS Trailer. Tandem LF/LCF=SS Lead 2B Trailer. Tag-up deep=anchor until first touch. Tag-up shallow=Recovery Lead walk off toward home. Momentum=pro-hop Heavy throw runner stays. Backpedaling Light throw runner goes. Wind Rule=Wind In 3 steps in. Wind Out 5 steps back.',
'Right Fielder':'CUTOFF ASSIGNMENTS: RF throw home=1B is cutoff Catcher commands. RF throw to 3rd=2B is cutoff 3B commands. BASE RULES: B3=Two outs go on contact. B4=Fly ball anchor until first touch. RF GOLDEN RULES: Throw home=aim for 1B cutoff mans chest Catcher calls CUT or THROUGH. Throw to 3rd=aim for 2B cutoff mans chest 3B calls CUT or THROUGH. Tandem RF/RCF wall=2B is Lead Relay Hands SS is Trailing Relay Boss calls base. RF Anomaly=regular depth R2 tag-up to 3rd is 45 percent success rate. Momentum=pro-hop Heavy throw runner stays. Backpedaling Light throw runner goes. Left foot on bag for standard push-off.',
'Baserunner':'BASE RULES: B1=Force play runner FORCED to advance hunt the bag no read no hesitation. Force ONLY when batter puts ball in play AND runner behind pushing. R2 alone NOT forced without R1. B2=Line drive freeze AND one hard step back toward bag. B3=Two outs run on contact no tagging. B4=Fly ball less than 2 outs anchored until ball is FIRST TOUCHED not caught. B5=R3 ground ball infield back=go on contact, infield in=read through mound, bases loaded=automatic forced. BASERUNNER GOLDEN RULES: Secondary lead=front foot landing is trigger 2 hard shuffles. Two outs=extend lead. Margin under 3=3 shuffles. Margin 5 plus=2 shuffles no ego outs. R1 fly ball=shallow hold, deep/gap halfway, wall tag if backpedaling, 2 outs gone. Overrun law=legal trigger is Attempt not direction of turn. Return with neutral shoulders. Shoulder pop or lean=ruled attempt. Tag-up first touch rule=can leave moment ball is FIRST TOUCHED not when secured. Line drive step-back=freeze plus ONE hard step back. Dual occupation=lead runner entitled to bag trailing runner out if tagged.',
'Hitter':'BASE RULES: B3=Two outs go on contact. Hit and run=swing at anything protect runner. HITTER GOLDEN RULES: Pitch tunneling=all pitches look identical first 20-25 feet forces early commitment. Foul-off reset=never same pitch/location twice after foul foul proves hitter timed velocity reset by changing speed or eye level. High heat sets up low curve. 0-2 count=expect waste pitch 2-3 inches off do not chase. Two-strike=expand zone protect plate contact over power. Hit and run=protect the runner swing at anything. Secondary scaling=tight game under 3 margin is 3 shuffles blowout 5 plus margin is 2 shuffles.'
};
function log(m,c=''){const el=document.getElementById('vlog');el.innerHTML+=`<span class="${c}">${m}</span> `;el.scrollTop=el.scrollHeight;}
function setlog(m,c=''){document.getElementById('vlog').innerHTML=`<span class="${c}">${m}</span>`;}
function wc(s){return(s||'').trim().split(/\s+/).length;}
async function gen(){
  document.getElementById('qout').classList.remove('on');
  document.getElementById('spin').classList.add('on');
  document.getElementById('gbtn').disabled=true;
  const pv=document.getElementById('psel').value;
  const tv=document.getElementById('tsel').value;
  const pos=pv==='auto'?POS[Math.floor(Math.random()*POS.length)]:pv;
  const tier=tv==='auto'?String(Math.ceil(Math.random()*3)):tv;
  const lv=document.getElementById('lsel').value;
  const LEVELS=['foundation','development','competitive','elite'];
  const age_level=lv==='auto'?LEVELS[Math.floor(Math.random()*LEVELS.length)]:lv;
  setlog(`Generating ${pos} | Tier ${tier} | ${age_level}...`,'linfo');
  try{
    const res=await fetch(W,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({position:pos,tier,age_level,engine_data:E[pos]||E['Pitcher']})});
    const q=await res.json();
    if(q.error){setlog('Error: '+q.error,'lfail');document.getElementById('spin').classList.remove('on');document.getElementById('gbtn').disabled=false;return;}
    q.position=pos;q.tier=tier;curQ=q;
    let pass=true;
    const cw=wc(q.correct_exp);
    if(cw>15){log('FAIL: '+cw+' words','lfail');pass=false;}else{log('Gate 2: word count OK','lok');}
    const txt=((q.correct_exp||'')+' '+Object.values(q.wrong_exps||{}).join(' ')).toLowerCase();
    const hit=BAN.find(b=>txt.includes(b));
    if(hit){log('FAIL: banned phrase','lfail');pass=false;}else{log('Gate 3: voice clean','lok');}
    if(pass)log('All gates passed','lok');
    render(q);gc++;document.getElementById('sgc').textContent=gc;
  }catch(e){setlog('Error: '+e.message,'lfail');document.getElementById('spin').classList.remove('on');document.getElementById('gbtn').disabled=false;}
}
function render(q){
  document.getElementById('spin').classList.remove('on');
  document.getElementById('qmeta').innerHTML=`<span class="qb bp">${q.position}</span><span class="qb bt">Tier ${q.tier}</span><span class="qb bs">${q.age_level||''}</span><span class="qb bs">${q.source||''}</span>`;
  document.getElementById('qsc').textContent=q.scenario||'';
  document.getElementById('qst').textContent=q.stem||'';
  const ch=document.getElementById('qch');ch.innerHTML='';
  (q.choices||[]).forEach(c=>{const b=document.createElement('button');b.className='cb';b.innerHTML=`<span class="cl">${c.letter}</span><span>${c.text}</span>`;b.onclick=()=>reveal(c.letter,q);ch.appendChild(b);});
  document.getElementById('exp').classList.remove('on');document.getElementById('exp').innerHTML='';
  document.getElementById('qout').classList.add('on');document.getElementById('gbtn').disabled=false;
}
function reveal(chosen,q){
  document.querySelectorAll('.cb').forEach(b=>{b.onclick=null;const l=b.querySelector('.cl').textContent;if(l===q.correct)b.classList.add('ok');else if(l===chosen&&chosen!==q.correct)b.classList.add('no');});
  const el=document.getElementById('exp');
  let h=`<div class="ec"><div class="elbl ok">Correct — ${q.correct}</div><div class="etxt">${q.correct_exp||''}</div></div>`;
  (q.choices||[]).filter(c=>c.letter!==q.correct).forEach(c=>{h+=`<div class="ew"><div class="elbl no">Wrong — ${c.letter}</div><div class="etxt">${(q.wrong_exps||{})[c.letter]||''}</div></div>`;});
  el.innerHTML=h;el.classList.add('on');
}
async function doPass(){
  if(!curQ){gen();return;}
  log('Saving to Supabase...','linfo');
  document.getElementById('gbtn').disabled=true;
  try{
    const res=await fetch('https://baseball-iq-badges.mattwhittaker9.workers.dev/save',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(curQ)
    });
    const d=await res.json();
    if(d.success){
      pc++;
      document.getElementById('spc').textContent=pc;
      log('Saved to DB — ID:'+d.id.slice(0,8),'lok');
    } else {
      log('Save failed: '+(d.error||'unknown'),'lfail');
    }
  }catch(e){
    log('Save error: '+e.message,'lfail');
  }
  gen();
}
async function doFlag(){
  if(!curQ){gen();return;}
  const reason=prompt('Flag reason (optional):','voice|rule|wrong_answers|other')||'';
  fc++;document.getElementById('sfc').textContent=fc;
  log('Flagging...','linfo');
  try{
    const payload=Object.assign({},curQ,{flag_reason:reason});
    const res=await fetch('https://baseball-iq-badges.mattwhittaker9.workers.dev/flag',{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)
    });
    const d=await res.json();
    if(d.success){log('Flagged — saved ID:'+d.id.slice(0,8),'lfail');}
    else{log('Flag save failed: '+(d.error||'unknown'),'lfail');}
  }catch(e){log('Flag error: '+e.message,'lfail');}
  gen();
}
</script>
</body>
</html>
